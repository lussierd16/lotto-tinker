name: Daily Lottery Update

on:
  schedule:
    # Runs at 10:00 UTC (6:00 AM EST) every day
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: read

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push data updates

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Update data and build dashboard
        shell: bash
        run: |
          set -euo pipefail
          python3 BuildDashboard.py --fetch --output-dir .

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html *.json *.csv
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Automated data & dashboard update"
          git push
