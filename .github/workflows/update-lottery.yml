name: Daily Lottery Update

on:
  schedule:
    # Runs at 10:00 UTC (6:00 AM EST) every day
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: read

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push data updates

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Update data and build dashboard
        shell: bash
        run: |
          set -euo pipefail
          python3 BuildDashboard.py --fetch --output-dir .

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html *.json *.csv
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Automated data & dashboard update"
          git push
